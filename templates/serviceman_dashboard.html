<!DOCTYPE html>
<html>
<head>
    <title>Service Man Dashboard</title>
    <link rel="stylesheet" href="/static/serviceman_dashboard.css">
</head>

<body>

<div class="bg-animation"></div>

<div class="container">

    <h2>🚀 Available Service Requests</h2>

    <div class="grid">

        {% for req in requests %}

        <div class="card">

            <div class="badge">{{ req[3] }}</div>

            <div class="content">
                <h3>{{ req[1] }}</h3>

                <p class="location">📍 {{ req[2] }}</p>

                <p class="desc">
                    {{ req[4] }}
                </p>
            </div>

            <form action="/apply_bid" method="GET">
                <input type="hidden" name="request_id" value="{{ req[0] }}">
                <button type="submit" class="apply-btn">⚡ Apply Now</button>
            </form>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
