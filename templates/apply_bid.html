<!DOCTYPE html>
<html>
<head>
<title>Apply Bid</title>
<link rel="stylesheet" href="/static/apply_bid.css">
</head>

<body>

<div class="container">

<h2>Apply for Job</h2>

<form action="/submit_bid" method="POST">

<input type="hidden" name="request_id" value="{{ request_id }}">

<input type="text" name="contact" placeholder="Your Mobile Number" required>

<input type="number" name="price" placeholder="Your Price (₹)" required>

<textarea name="message" placeholder="Your Message"></textarea>

<button type="submit">Submit Bid</button>

</form>

</div>

</body>
</html>
